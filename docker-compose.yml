version: '3.8'

services:
  db:
    image: postgres:15
    container_name: devflow_db
    environment:
      POSTGRES_USER: devflow_user
      POSTGRES_PASSWORD: devflow_password
      POSTGRES_DB: devflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
